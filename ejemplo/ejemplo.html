    <!-- Custom CSS para animaciones -->
    <style>
        .font-playfair {
            font-family: 'Playfair Display', serif;
        }

        @keyframes shimmer {
            100% {
                transform: translateX(100%) skewX(-15deg);
            }
        }

        .animate-shimmer {
            animation: shimmer 1.5s infinite;
        }

        /* Utilidades personalizadas de Tailwind */
        .slide-in-bottom {
            animation: slideInBottom 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
        }

        @keyframes slideInBottom {
            0% {
                transform: translateY(20px);
                opacity: 0;
            }

            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .zoom-in {
            animation: zoomIn 0.5s ease-out both;
        }

        @keyframes zoomIn {
            0% {
                transform: scale(0.95);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

    <!-- ================== LOGICA JAVASCRIPT ================== -->
    <script>
        const translations = {
            es: {
                bio: "Tu destino de belleza premium. Tu tienda exclusiva donde encuentras marcas globales icónicas como Tarte, Elaluz y los secretos de cosmética más deseados del mundo.",
                storeBtn: "Visitar Tienda Online",
                socialsTitle: "Nuestras Redes",
                whatsappTitle: "Contáctanos",
                waSales1: "WhatsApp Ventas 1",
                waSales2: "WhatsApp Ventas 2",
                waDirectText: "Escribinos directamente · ¡respondemos rápido! 🚀",
                waPlaceholder: "¡Hola! Vi el perfil de ElaBela y me gustaría saber más 💄",
                waSendBtn: "Enviar mensaje",
                footer: "© 2024 ElaBela Glow. Todos los derechos reservados.",
                backBtn: "← Cambiar país"
            },
            pt: {
                bio: "Seu destino de beleza premium. Sua loja exclusiva onde você encontra marcas globais icônicas como Tarte, Elaluz e os segredos de cosméticos mais desejados do mundo.",
                storeBtn: "Visitar Loja Online",
                socialsTitle: "Nossas Redes",
                whatsappTitle: "Fale Conosco",
                waSales1: "WhatsApp Vendas 1",
                waSales2: "WhatsApp Vendas 2",
                waDirectText: "Escreva diretamente · respondemos rápido! 🚀",
                waPlaceholder: "Olá! Vi o perfil da ElaBela e gostaria de saber mais 💄",
                waSendBtn: "Enviar mensagem",
                footer: "© 2024 ElaBela Glow. Todos os direitos reservados.",
                backBtn: "← Mudar país"
            }
        };

        let currentLang = 'es';

        function setLang(lang) {
            currentLang = lang;
            const t = translations[lang];

            // Ocultar pantalla de idioma, mostrar Linktree
            document.getElementById('screen-lang').classList.add('hidden');
            document.getElementById('screen-main').classList.remove('hidden');

            // Actualizar textos usando data-i18n
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) {
                    el.innerText = t[key];
                }
            });

            // Actualizar botón de retroceso
            document.getElementById('btn-back').innerText = t.backBtn;

            // Resetear acordeones al cambiar de idioma
            closeAllWa();
        }

        function goBack() {
            document.getElementById('screen-main').classList.add('hidden');
            document.getElementById('screen-lang').classList.remove('hidden');
            closeAllWa();
        }

        function toggleWa(id) {
            const content = document.getElementById(id + '-content');
            const chevron = document.getElementById(id + '-chevron');
            const container = document.getElementById(id + '-container');
            const textarea = document.getElementById(id + '-msg');

            const isOpen = content.classList.contains('max-h-64');

            // Cerrar todos primero
            closeAllWa();

            // Si no estaba abierto, lo abrimos
            if (!isOpen) {
                content.classList.remove('max-h-0', 'opacity-0');
                content.classList.add('max-h-64', 'opacity-100');
                chevron.classList.add('rotate-180');
                container.classList.add('ring-2', 'ring-[#25D366]/50', 'shadow-md');
                container.classList.remove('hover:bg-white');

                // Setear mensaje por defecto según el idioma
                textarea.value = translations[currentLang].waPlaceholder;
            }
        }

        function closeAllWa() {
            ['wa1', 'wa2'].forEach(waId => {
                document.getElementById(waId + '-content').classList.remove('max-h-64', 'opacity-100');
                document.getElementById(waId + '-content').classList.add('max-h-0', 'opacity-0');
                document.getElementById(waId + '-chevron').classList.remove('rotate-180');
                document.getElementById(waId + '-container').classList.remove('ring-2', 'ring-[#25D366]/50', 'shadow-md');
                document.getElementById(waId + '-container').classList.add('hover:bg-white');
            });
        }

        function sendWhatsApp(number, textareaId) {
            const text = document.getElementById(textareaId).value;
            const encodedText = encodeURIComponent(text);
            window.open(`https://wa.me/${number}?text=${encodedText}`, '_blank');
        }
    </script>
